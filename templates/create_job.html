{% extends "base.html" %}
{% block title %}Create Job{% endblock %}
{% block content %}
<div class="card narrow slide-up">
  <div style="text-align:center; margin-bottom:8px;">
    <span class="card-icon" style="margin:0 auto 14px; width:48px; height:48px; font-size:20px;">
      <i class="fa-solid fa-briefcase"></i>
    </span>
  </div>
  <h2 style="text-align:center;">Create Job Description</h2>
  <p class="page-subtitle" style="text-align:center; margin-bottom:24px;">
    The AI agent will use this JD to score and rank every resume you upload.
  </p>

  <form method="POST" novalidate>
    <div class="field">
      <label for="job-title">Job Title</label>
      <input id="job-title" type="text" name="title" placeholder="e.g. Backend Python Developer" required>
    </div>

    <div class="field">
      <label for="job-description">Job Description</label>
      <textarea id="job-description" name="description" rows="10" placeholder="Responsibilities, required skills, experience, qualifications..." required></textarea>
      <div class="field-hint"><i class="fa-solid fa-wand-magic-sparkles"></i> The fuller the JD, the more accurate the AI matching.</div>
    </div>

    <div class="field">
      <label for="job-skills">Required Skills <span style="font-weight:400; color:var(--text-muted);">(optional, comma separated)</span></label>
      <input id="job-skills" type="text" name="required_skills" placeholder="python, django, sql, aws">
    </div>

    <button type="submit" class="btn" style="width:100%;">
      <i class="fa-solid fa-arrow-right"></i> Create Job &amp; Continue to Upload
    </button>
  </form>
</div>
{% endblock %}
