{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-shell">
  <div class="auth-card fade-in">
    <div class="auth-logo"><i class="fa-solid fa-bolt"></i></div>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to AcuRecruit to continue screening candidates.</p>

    <form method="POST" novalidate>
      <div class="field input-icon-wrap">
        <label for="login-email">Email address</label>
        <i class="fa-regular fa-envelope field-icon"></i>
        <input id="login-email" type="email" name="email" placeholder="you@company.com" required autofocus>
      </div>

      <div class="field input-icon-wrap password-wrap">
        <label for="login-password">Password</label>
        <i class="fa-solid fa-lock field-icon"></i>
        <input id="login-password" type="password" name="password" placeholder="Enter your password" required>
        <button type="button" class="toggle-password" tabindex="-1" aria-label="Show password">
          <i class="fa-solid fa-eye"></i>
        </button>
      </div>

      <button type="submit" class="btn" style="width:100%; margin-top:6px;">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </form>

    <div class="auth-demo-hint">
      <i class="fa-solid fa-circle-info"></i>
      Demo admin: <code>admin@example.com</code> / <code>admin123</code>
    </div>
  </div>
</div>
{% endblock %}
